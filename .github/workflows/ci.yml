name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege by default, per this repo's own defense-in-depth guidance.
permissions:
  contents: read

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      # Actions are SHA-pinned (with a version comment) per the defense-in-depth skill.
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # This job runs PR-controlled code (the validator) and performs no authenticated git
          # operations after checkout, so don't leave the workflow token on disk for it.
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      # The validator is dependency-free, so no install step is required.
      - name: Validate skills
        run: node scripts/validate-skills.mjs
